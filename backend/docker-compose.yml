version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./src:/app/src
      - /app/node_modules
    command: npm run dev
    networks:
      - aulbridge-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aulbridge
      - POSTGRES_PASSWORD=aulbridge_password
      - POSTGRES_DB=aulbridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aulbridge-network

volumes:
  postgres_data:

networks:
  aulbridge-network:
    driver: bridge
