<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-label="Rectangle made from four equal squares">
  <rect width="720" height="260" rx="28" fill="#f5f3ff"/>
  <g transform="translate(120 70)">
    <rect x="0" y="0" width="120" height="120" fill="#ede9fe" stroke="#6d28d9" stroke-width="5"/>
    <rect x="120" y="0" width="120" height="120" fill="#ddd6fe" stroke="#6d28d9" stroke-width="5"/>
    <rect x="240" y="0" width="120" height="120" fill="#ede9fe" stroke="#6d28d9" stroke-width="5"/>
    <rect x="360" y="0" width="120" height="120" fill="#ddd6fe" stroke="#6d28d9" stroke-width="5"/>
  </g>
  <text x="360" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#1e1b4b">әр шаршы: 25 см²</text>
</svg>
