<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" role="img" aria-label="Rectangular tiles forming a square">
  <rect width="560" height="360" rx="28" fill="#f5f3ff"/>
  <g transform="translate(160 60)" stroke="#6d28d9" stroke-width="4">
    <rect x="0" y="0" width="240" height="240" fill="#fff"/>
    <rect x="0" y="0" width="120" height="80" fill="#ede9fe"/>
    <rect x="120" y="0" width="120" height="80" fill="#ddd6fe"/>
    <rect x="0" y="80" width="120" height="80" fill="#ddd6fe"/>
    <rect x="120" y="80" width="120" height="80" fill="#ede9fe"/>
    <rect x="0" y="160" width="120" height="80" fill="#ede9fe"/>
    <rect x="120" y="160" width="120" height="80" fill="#ddd6fe"/>
  </g>
  <text x="280" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#1e1b4b">тақтайша: 4 см × 6 см</text>
</svg>
